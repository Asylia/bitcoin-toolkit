name: Release Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Version or publish npm packages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use npm with trusted publishing support
        run: npm install -g npm@^11.10.0 && npm --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn build

      - name: Check npm package contents
        run: yarn pack:check

      - name: Configure npm token fallback
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > ~/.npmrc
          else
            echo "No NPM_TOKEN secret configured; relying on npm Trusted Publishing for Asylia/bitcoin-toolkit via release-packages.yml."
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create version PR or publish packages
        id: changesets
        uses: changesets/action@v1
        with:
          version: yarn version:packages
          publish: yarn release:packages
          title: Version Packages
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
